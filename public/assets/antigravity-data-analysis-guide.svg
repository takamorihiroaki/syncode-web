<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：正方形キャンバス -->
  <rect width="1200" height="1200" fill="#020617"/>
  
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" />
    </filter>
  </defs>

  <!-- 背後のグリッド：データの海 -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <path d="M0 200H1200M0 400H1200M0 600H1200M0 800H1200M0 1000H1200"/>
    <path d="M200 0V1200M400 0V1200M600 0V1200M800 0V1200M1000 0V1200"/>
  </g>

  <!-- 中心：分割と軽量化の象徴 -->
  <g transform="translate(600, 600)">
    <!-- 巨大な塊が分割されるイメージ -->
    <rect x="-250" y="-250" width="150" height="150" stroke="white" stroke-width="1" opacity="0.1"/>
    <rect x="-50" y="-250" width="150" height="150" stroke="white" stroke-width="1" opacity="0.2"/>
    <rect x="150" y="-250" width="150" height="150" stroke="white" stroke-width="1" opacity="0.1"/>
    
    <!-- 黄金のコア（軽量化されたデータ） -->
    <rect x="-50" y="-50" width="150" height="150" fill="#FACC15" opacity="0.1" filter="url(#glow)"/>
    <rect x="-50" y="-50" width="150" height="150" stroke="#FACC15" stroke-width="2"/>
    <path d="M-50 -20H100M-50 10H100M-50 40H100" stroke="#FACC15" stroke-width="1" opacity="0.5"/>
    
    <rect x="-250" y="150" width="150" height="150" stroke="white" stroke-width="1" opacity="0.2"/>
    <rect x="-50" y="150" width="150" height="150" stroke="white" stroke-width="1" opacity="0.1"/>
  </g>
</svg>
