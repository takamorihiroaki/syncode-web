<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="1200" fill="#020617"/>
  
  <defs>
    <filter id="accent_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" />
    </filter>
  </defs>

  <!-- 構造を象徴する垂直・水平ライン -->
  <g opacity="0.1" stroke="white" stroke-width="0.5">
    <path d="M600 0V1200M0 600H1200"/>
    <circle cx="600" cy="600" r="400" />
  </g>

  <!-- 整理されたファイルディレクトリの象徴 -->
  <g transform="translate(600, 600)">
    <!-- 1段目（ルート） -->
    <rect x="-40" y="-300" width="80" height="80" fill="#FACC15" opacity="0.1" filter="url(#accent_glow)"/>
    <rect x="-40" y="-300" width="80" height="80" stroke="#FACC15" stroke-width="2"/>
    
    <!-- 接続線 -->
    <path d="M0 -220V-100M-200 -100H200M-200 -100V-20M0 -100V-20M200 -100V-20" stroke="white" stroke-width="1" opacity="0.3"/>
    
    <!-- 2段目（モジュール） -->
    <rect x="-240" y="-20" width="80" height="80" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <rect x="-40" y="-20" width="80" height="80" stroke="white" stroke-width="2" opacity="0.8"/>
    <rect x="160" y="-20" width="80" height="80" stroke="white" stroke-width="0.5" opacity="0.5"/>
    
    <!-- 3段目への展開 -->
    <path d="M0 60V140M-40 140H40M-40 140V220M40 140V220" stroke="white" stroke-width="1" opacity="0.2"/>
    <rect x="-65" y="220" width="50" height="50" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <rect x="15" y="220" width="50" height="50" stroke="white" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>