<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1c2e;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- BACKGROUND -->
  <rect width="800" height="800" fill="url(#mainGrad)"/>
  <rect width="800" height="800" fill="url(#grid)"/>
  
  <!-- CENTER FRAME -->
  <rect x="150" y="250" width="500" height="300" rx="20" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
  
  <!-- SUBTITLE -->
  <text x="400" y="220" font-family="sans-serif" font-size="20" font-weight="700" fill="#b8860b" letter-spacing="0.4em" text-anchor="middle">GA4 ANALYSIS // DATA DISCOVERY</text>
  
  <!-- MAIN TITLE -->
  <text x="400" y="370" font-family="sans-serif" font-size="44" font-weight="700" fill="white" text-anchor="middle" filter="url(#textGlow)">GA4分析の真実</text>
  <text x="400" y="440" font-family="sans-serif" font-size="28" font-weight="300" fill="rgba(255,255,255,0.6)" text-anchor="middle">滞在時間 25分の衝撃</text>
  
  <!-- ACCENT BAR -->
  <rect x="360" y="480" width="80" height="4" rx="2" fill="#d97706" />
  
  <!-- CORNER ACCENTS -->
  <path d="M 40 40 L 100 40 M 40 40 L 40 100" stroke="#b8860b" stroke-width="3" />
  <path d="M 760 760 L 700 760 M 760 760 L 760 700" stroke="#b8860b" stroke-width="3" />
  
  <!-- FOOTER -->
  <text x="400" y="750" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="0.2em">SYNCODE TECHNICAL // PROTOCOL: OPTIMIZED</text>
</svg>
