<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：深いテクスチャ感のあるダークグラデーション -->
  <rect width="1200" height="675" fill="url(#paint0_linear)"/>
  <rect width="1200" height="675" fill="url(#paint1_radial)" opacity="0.6"/>
  
  <defs>
    <linearGradient id="paint0_linear" x1="600" y1="0" x2="600" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="paint1_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 337.5) rotate(90) scale(400 800)">
      <stop stop-color="#1E293B" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" />
    </filter>
  </defs>

  <!-- デジタルな水平線 -->
  <line x1="0" y1="337.5" x2="1200" y2="337.5" stroke="white" stroke-width="0.2" opacity="0.2"/>
  
  <!-- 多層的な抽象データ構造（グリッド） -->
  <g opacity="0.05">
    <path d="M0 100H1200M0 200H1200M0 400H1200M0 500H1200" stroke="white" stroke-width="0.5"/>
    <path d="M400 0V675M800 0V675" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- 黄金の旗（Survival Strategy）のエフェクト -->
  <circle cx="600" cy="337.5" r="60" fill="#FACC15" opacity="0.1" filter="url(#glow)"/>
  
  <!-- 思考の軌跡を描く曲線 -->
  <path d="M200 400C400 350 500 380 600 337.5" stroke="url(#line_grad)" stroke-width="1" opacity="0.4"/>
  <path d="M1000 200C800 250 700 220 600 337.5" stroke="url(#line_grad)" stroke-width="1" opacity="0.4"/>
  
  <linearGradient id="line_grad" x1="200" y1="400" x2="600" y2="337.5" gradientUnits="userSpaceOnUse">
    <stop stop-color="white" stop-opacity="0"/>
    <stop offset="1" stop-color="#FACC15" />
  </linearGradient>

  <!-- 黄金の垂直線（核心） -->
  <rect x="599" y="150" width="2" height="375" fill="url(#core_grad)"/>
  <linearGradient id="core_grad" x1="600" y1="150" x2="600" y2="525" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FACC15" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#FACC15"/>
    <stop offset="1" stop-color="#FACC15" stop-opacity="0"/>
  </linearGradient>

  <!-- 浮遊する思考の断片（ノイズ） -->
  <g opacity="0.4">
    <circle cx="600" cy="337.5" r="3" fill="#FACC15"/>
    <circle cx="200" cy="150" r="1" fill="white"/>
    <circle cx="1000" cy="500" r="1" fill="white"/>
    <circle cx="150" cy="450" r="1.5" fill="#FACC15"/>
    <circle cx="850" cy="120" r="1.5" fill="white"/>
  </g>
</svg>
