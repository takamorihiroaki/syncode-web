<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99, 102, 241, 0.08)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowBody" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#mainGrad)"/>
  <rect width="800" height="800" fill="url(#grid)"/>
  <circle cx="400" cy="400" r="400" fill="url(#glowBody)"/>

  <rect x="150" y="250" width="500" height="300" rx="20" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
  
  <text x="400" y="220" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#6366f1" letter-spacing="0.5em" text-anchor="middle">CHRONICLES VOL.01</text>
  
  <text x="400" y="360" font-family="'Noto Sans JP', sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" filter="url(#textGlow)">AIとの同期、その始まり。</text>
  <text x="400" y="440" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="300" fill="rgba(255,255,255,0.7)" text-anchor="middle">真っ白な領域に刻まれるブランド</text>
  
  <rect x="360" y="480" width="80" height="4" rx="2" fill="#6366f1" />

  <path d="M 40 40 L 100 40 M 40 40 L 40 100" stroke="#6366f1" stroke-width="3" />
  <path d="M 760 760 L 700 760 M 760 760 L 760 700" stroke="#6366f1" stroke-width="3" />
  <text x="400" y="750" font-family="Inter, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="0.2em">SYNCODE CHRONICLES // INCEPTION PHASE</text>
</svg>
