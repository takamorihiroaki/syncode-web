<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Abstract Grid/Nodes for Logic -->
  <g opacity="0.4">
    <circle cx="200" cy="150" r="4" fill="#555" />
    <circle cx="1000" cy="150" r="4" fill="#555" />
    <circle cx="200" cy="480" r="4" fill="#555" />
    <circle cx="1000" cy="480" r="4" fill="#555" />
    <circle cx="600" cy="315" r="8" fill="#888" filter="url(#glow)" />
    
    <line x1="200" y1="150" x2="600" y2="315" stroke="url(#lineGrad)" stroke-width="1" />
    <line x1="1000" y1="150" x2="600" y2="315" stroke="url(#lineGrad)" stroke-width="1" />
    <line x1="200" y1="480" x2="600" y2="315" stroke="url(#lineGrad)" stroke-width="1" />
    <line x1="1000" y1="480" x2="600" y2="315" stroke="url(#lineGrad)" stroke-width="1" />
    
    <path d="M100 315 Q 350 100 600 315 T 1100 315" fill="none" stroke="#222" stroke-width="2" />
    <path d="M100 150 Q 600 630 1100 150" fill="none" stroke="#222" stroke-width="2" />
  </g>

  <!-- Typography -->
  <text x="600" y="260" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="300" letter-spacing="8" fill="#888" style="text-transform: uppercase;">Optimization Logic</text>
  <text x="600" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="4" fill="#eee">INTERNAL LINKING</text>
  <text x="600" y="400" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="400" letter-spacing="2" fill="#666">AI-Driven Site Circulation Strategy</text>

  <!-- Minimal Border -->
  <rect x="50" y="50" width="1100" height="530" fill="none" stroke="#333" stroke-width="1" />
</svg>
