<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#020617"/>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- 背景のグリッド -->
  <g opacity="0.1">
    <path d="M0 100H1200" stroke="white" stroke-width="0.5"/>
    <path d="M0 200H1200" stroke="white" stroke-width="0.5"/>
    <path d="M0 300H1200" stroke="white" stroke-width="0.5"/>
    <path d="M0 400H1200" stroke="white" stroke-width="0.5"/>
    <path d="M0 500H1200" stroke="white" stroke-width="0.5"/>
    <path d="M400 0V675" stroke="white" stroke-width="0.5"/>
    <path d="M600 0V675" stroke="white" stroke-width="0.5"/>
    <path d="M800 0V675" stroke="white" stroke-width="0.5"/>
  </g>
  
  <!-- 中央のセキュリティシンボル：シールド -->
  <path d="M600 200C550 200 500 180 500 150V350C500 450 600 500 600 500C600 500 700 450 700 350V150C700 180 650 200 600 200Z" fill="#1E293B" stroke="#FACC15" stroke-width="4" filter="url(#glow)"/>
  
  <!-- デジタルロックの意匠 -->
  <rect x="580" y="300" width="40" height="10" rx="2" fill="#FACC15"/>
  <rect x="580" y="325" width="40" height="10" rx="2" fill="#FACC15"/>
  
  <!-- 安全な境界線のライン -->
  <path d="M100 550H1100" stroke="#FACC15" stroke-width="2" stroke-dasharray="10 10" opacity="0.5"/>
  <text x="600" y="600" fill="#FACC15" font-family="sans-serif" font-size="20" text-anchor="middle" font-weight="bold" letter-spacing="0.2em">ABSOLUTE DEFENSE ACTIVE</text>
  
  <!-- 浮遊するデータパケット -->
  <circle cx="300" cy="250" r="4" fill="#FACC15" opacity="0.6"/>
  <circle cx="900" cy="450" r="4" fill="#FACC15" opacity="0.6"/>
  <circle cx="200" cy="400" r="2" fill="white" opacity="0.4"/>
</svg>
