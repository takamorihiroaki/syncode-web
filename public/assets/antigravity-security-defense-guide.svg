<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="1200" fill="#020617"/>
  
  <defs>
    <filter id="shield_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
    </filter>
  </defs>

  <!-- 背後のパターン：防御コードの流れ -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <path d="M0 600L1200 600" />
    <circle cx="600" cy="600" r="300" stroke-dasharray="10 20"/>
    <circle cx="600" cy="600" r="500" stroke-dasharray="5 15"/>
  </g>

  <!-- 黄金の盾（シールドコア） -->
  <g transform="translate(600, 600)">
    <!-- 外光 -->
    <path d="M0 -300C120 -300 240 -200 240 0C240 200 120 350 0 400C-120 350 -240 200 -240 0C-240 -200 -120 -300 0 -300Z" fill="#FACC15" opacity="0.05" filter="url(#shield_glow)"/>
    
    <!-- メインシールド -->
    <path d="M0 -200C80 -200 160 -140 160 0C160 140 80 240 0 280C-80 240 -160 140 -160 0C-160 -140 -80 -200 0 -200Z" stroke="#FACC15" stroke-width="4" opacity="0.8"/>
    
    <!-- 内側のディテール -->
    <path d="M0 -140V180M-80 0H80" stroke="#FACC15" stroke-width="1" opacity="0.4"/>
    <circle r="20" fill="#FACC15" opacity="0.8"/>
  </g>
</svg>
