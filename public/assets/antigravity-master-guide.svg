<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="1200" fill="#020617"/>
  
  <defs>
    <filter id="core_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="50" />
    </filter>
  </defs>

  <!-- 背後の巨大な回転リング（統合された知性） -->
  <g opacity="0.1">
    <circle cx="600" cy="600" r="500" stroke="white" stroke-width="0.5" stroke-dasharray="20 40"/>
    <circle cx="600" cy="600" r="450" stroke="white" stroke-width="2" opacity="0.2"/>
  </g>

  <!-- 中心部のマスターコア -->
  <g transform="translate(600, 600)">
    <!-- 外光 -->
    <circle r="200" fill="#FACC15" opacity="0.05" filter="url(#core_glow)"/>
    
    <!-- 六角形のコア -->
    <path d="M0 -150L130 -75V75L0 150L-130 75V-75L0 -150Z" stroke="#FACC15" stroke-width="4" opacity="0.8"/>
    <path d="M0 -100L86 -50V50L0 100L-86 50V-50L0 -100Z" fill="#FACC15" opacity="0.1"/>
    
    <!-- 内部の精密なライン -->
    <line x1="-130" y1="0" x2="130" y2="0" stroke="#FACC15" stroke-width="1" opacity="0.3"/>
    <line x1="-65" y1="-112" x2="65" y2="112" stroke="#FACC15" stroke-width="1" opacity="0.3"/>
    <line x1="65" y1="-112" x2="-65" y2="112" stroke="#FACC15" stroke-width="1" opacity="0.3"/>
    
    <circle r="10" fill="#FACC15"/>
  </g>
</svg>
