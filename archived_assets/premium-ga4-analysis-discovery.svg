<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(100,100,255,0.05)" stroke-width="1"/>
    </pattern>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="800" height="800" fill="url(#mainGrad)"/>
  <rect width="800" height="800" fill="url(#grid)"/>
  
  <text x="400" y="240" font-family="sans-serif" font-size="32" font-weight="700" fill="#0ea5e9" letter-spacing="0.5em" text-anchor="middle">STORY CHRONICLE</text>
  
  <text x="400" y="420" font-family="sans-serif" font-size="84" font-weight="900" fill="white" text-anchor="middle" filter="url(#strongGlow)">分析の真実</text>
  
  <text x="400" y="520" font-family="sans-serif" font-size="40" font-weight="300" fill="rgba(255,255,255,0.8)" text-anchor="middle">驚異の滞在時間の正体</text>
  
  <rect x="340" y="580" width="120" height="6" rx="3" fill="#38bdf8" />
  
  <path d="M 60 60 L 140 60 M 60 60 L 60 140" stroke="#0ea5e9" stroke-width="4" />
  <path d="M 740 740 L 660 740 M 740 740 L 740 660" stroke="#0ea5e9" stroke-width="4" />
  
  <text x="400" y="740" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="0.2em">SYNCODE // PROTOCOL: ACTIVATED</text>
</svg>